# Copy this file to config.yaml and adjust the values for your workspace.
# Keep secrets such as DATABRICKS_TOKEN in .env, not in this file.
#
# What belongs here:
# - shared model/provider/profile defaults
# - env var references such as host_env / base_url_env
# - reusable experiment groupings
#
# What still belongs outside config today:
# - `--tui`, `--db`, `--graph-dataset`, and `--trace` remain CLI flags
# - secrets such as DATABRICKS_TOKEN / GEMINI_API_KEY / COHERE_API_KEY stay in .env
# - do not set `parallel_tool_calls` for Databricks profiles; rag-tag strips it

defaults:
  router_profile: router-gemini-flash
  agent_profile: dbx-claude-sonnet-4-6
  router_mode: llm
  # Allowed values: pydanticai, langgraph
  # This controls graph-route orchestration only, not model/provider selection.
  graph_orchestrator: pydanticai

graph_orchestration:
  # Tunables for graph-route orchestration behavior.
  enabled_subquestion_decomposition: true
  max_subquestions: 3
  reserved_orchestration_steps: 3
  specialist_step_cap: null
  fallback_to_graph_agent: true
  graph_max_steps: 20
  graph_output_retries: 5

providers:
  databricks:
    type: databricks
    # Read the Databricks workspace host from .env or shell env.
    host_env: DATABRICKS_HOST
    token_env: DATABRICKS_TOKEN

profiles:
  router-gemini-flash:
    model: google-gla:gemini-2.5-flash
    settings:
      temperature: 0.0

  # Current non-Databricks graph-agent baseline.
  cohere-command-a:
    model: cohere:command-a-03-2025
    settings:
      temperature: 0.1
      max_tokens: 1024

  dbx-claude-sonnet-4-6:
    provider: databricks
    # For Databricks-backed profiles, model is the serving endpoint name.
    # For Foundation Model API usage this is often the Databricks model name.
    model: databricks-claude-sonnet-4-6
    settings:
      temperature: 0.1
      max_tokens: 1024

  dbx-gpt-oss-20b:
    provider: databricks
    model: databricks-gpt-oss-20b
    settings:
      temperature: 0.1
      max_tokens: 1024

  dbx-llama-4-maverick:
    provider: databricks
    model: databricks-llama-4-maverick
    settings:
      temperature: 0.1
      max_tokens: 1024

  dbx-gemma-3-12b:
    provider: databricks
    model: databricks-gemma-3-12b
    settings:
      temperature: 0.1
      max_tokens: 1024

experiments:
  graph-dbx-smoke:
    description: Compare Databricks graph-agent profiles on the same questions.
    router_profile: router-gemini-flash
    agent_profile: dbx-claude-sonnet-4-6
    profiles:
      - dbx-claude-sonnet-4-6
      - dbx-gpt-oss-20b
      - dbx-llama-4-maverick
      - dbx-gemma-3-12b

  graph-agent-compare:
    description: Compare the current Cohere graph agent against Databricks options.
    router_profile: router-gemini-flash
    agent_profile: cohere-command-a
    profiles:
      - cohere-command-a
      - dbx-claude-sonnet-4-6
      - dbx-gpt-oss-20b
      - dbx-llama-4-maverick
      - dbx-gemma-3-12b
